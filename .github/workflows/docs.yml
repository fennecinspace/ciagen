name: Docs

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  trigger-rtd:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger ReadTheDocs build
        run: |
          curl -X POST https://readthedocs.org/api/v3/projects/ciagen/versions/latest/builds/ \
            -H "Authorization: Token ${{ secrets.RTDS_API_TOKEN }}"