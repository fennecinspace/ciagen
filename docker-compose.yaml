version: "3.9"

services:
  ciagen:
    shm_size: '1024m'
    container_name: ciagen
    build:
      context: .
      dockerfile: ${DOCKERFILE}
      args:
        - USER_ID=$USER_ID
        - GROUP_ID=$GROUP_ID
    image: ciagen
    tty: true
    volumes:
      - .:/gen_data
      - /data:/data
      - ${HOME}/docker/home/user:/home/user
    user: ${USER_ID}:${GROUP_ID}
    environment:
      - DATA_DIR=/gen_data/data
      - NVIDIA_VISIBLE_DEVICES=all
    runtime: ${RUNTIME} # nvidia
    working_dir: /gen_data
    entrypoint: tail -f /dev/null
